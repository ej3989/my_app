# Basic console/log output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ASSERT=y
CONFIG_DEBUG_OPTIMIZATIONS=y

# Display and touch hardware
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_ILI9488=y
CONFIG_MIPI_DBI=y
CONFIG_INPUT=y
CONFIG_INPUT_XPT2046=n
CONFIG_WAVESHARE_35C_INPUT_XPT2046=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_I2S=y

# LVGL
CONFIG_LVGL=y
CONFIG_LV_Z_AUTO_INIT=n
CONFIG_LV_Z_POINTER_INPUT=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_MSGBOX=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_Z_MEM_POOL_SIZE=65536
CONFIG_LV_Z_MEMORY_POOL_CUSTOM_SECTION=y

# Main only starts the LVGL EJ thread, so it no longer needs to hold LVGL setup.
CONFIG_MAIN_STACK_SIZE=4096

# Optional stack usage measurement
# CONFIG_LVGL_EJ_STACK_USAGE_LOG=y
# CONFIG_LVGL_EJ_STACK_LOG_INTERVAL_MS=5000
# CONFIG_APP_STACK_USAGE_LOG=y
CONFIG_INIT_STACKS=y
