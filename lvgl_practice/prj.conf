# Basic console/log output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ASSERT=y
CONFIG_DEBUG_OPTIMIZATIONS=y

# Persistent settings with NVS
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Display and touch hardware
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_ILI9488=y
CONFIG_MIPI_DBI=y
CONFIG_INPUT=y
CONFIG_INPUT_XPT2046=n
CONFIG_EJ3989_INPUT_XPT2046=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_I2S=y
# Audio - MAX98357A
CONFIG_I2S=y
CONFIG_I2S_ESP32_TX_BLOCK_COUNT=20
CONFIG_I2S_ESP32_ALLOWED_EMPTY_TX_QUEUE_DEFERRAL_TIME_MS=50

# Wi-Fi, HTTP and MP3 internet radio
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_DHCPV4=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_EVENTS=y
# A 128 kbps stream needs sustained RX throughput above 16 KB/s.
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_TCP_MAX_RECV_WINDOW_SIZE=16384
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_WIFI=y
CONFIG_WIFI_USAGE_MODE_STA=y
CONFIG_ESP32_WIFI_STA_RECONNECT=y
CONFIG_ESP_WIFI_HEAP_SPIRAM=y
CONFIG_ESP32_WIFI_NET_ALLOC_SPIRAM=n
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=12
CONFIG_ESP32_WIFI_RX_IRAM_OPT=y
# Set these in a private extra conf file instead of committing credentials.
# CONFIG_APP_WIFI_SSID="your-ssid"
# CONFIG_APP_WIFI_PSK="your-password"

# temperature/Humidity - AHT10
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_EJ3989_SENSOR_AHT10=y

# LVGL
CONFIG_LVGL=y
CONFIG_LV_Z_AUTO_INIT=n
CONFIG_LV_Z_POINTER_INPUT=y
CONFIG_LV_COLOR_16_SWAP=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_MSGBOX=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_Z_MEM_POOL_SIZE=65536
CONFIG_LV_Z_MEMORY_POOL_CUSTOM_SECTION=y
# CONFIG_LV_Z_BUFFER_ALLOC_STATIC=y // 외부 램으로 설정 했으나 30kbyte 차이여서 원복함 
# CONFIG_LV_Z_VDB_CUSTOM_SECTION=y // 외부 램으로 설정 했으나 30kbyte 차이여서 원복함 

# Main only starts the LVGL EJ thread, so it no longer needs to hold LVGL setup.
CONFIG_MAIN_STACK_SIZE=4096

# Optional stack usage measurement
# CONFIG_LVGL_EJ_STACK_USAGE_LOG=y
# CONFIG_LVGL_EJ_STACK_LOG_INTERVAL_MS=5000
# CONFIG_APP_STACK_USAGE_LOG=y
CONFIG_INIT_STACKS=y
